name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify Tag Matches Cargo Version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version=$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')

          if [ "$tag_version" != "$cargo_version" ]; then
            printf 'Tag version v%s does not match Cargo.toml version %s\n' "$tag_version" "$cargo_version" >&2
            exit 1
          fi

      - name: Check Formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Tests
        run: cargo test

      - name: Build Release Binary
        run: cargo build --release --bin kiln

      - name: Package Release Artifact
        run: |
          artifact="kiln-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu"
          mkdir -p "$artifact"
          cp target/release/kiln "$artifact/"
          cp README.md "$artifact/"
          cp .env.example "$artifact/"
          mkdir -p "$artifact/config"
          cp config/kiln.example.toml "$artifact/config/"
          tar -czf "$artifact.tar.gz" "$artifact"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: kiln-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
